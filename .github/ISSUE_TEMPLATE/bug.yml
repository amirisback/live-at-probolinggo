name: 🐞 Bug Report
description: Laporkan bug atau masalah
title: "[BUG] "
labels: ["bug"]

body:
  - type: input
    id: summary
    attributes:
      label: Ringkasan Bug
      placeholder: "Contoh: Aplikasi crash saat login"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Langkah Reproduksi
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Perilaku yang Diharapkan
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Perilaku yang Terjadi
    validations:
      required: true
